<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chèques — Arche de Mallo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  .split-layout{display:grid;grid-template-columns:1fr 400px;gap:14px;align-items:start;}
  .form-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:sticky;top:60px;}
  .form-card-title{font-size:13px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}
  .form-card-title i{color:var(--orange);}
  .form-group{margin-bottom:10px;}
  .form-label{display:block;font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .form-label.req::after{content:' *';color:var(--red);}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .list-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .list-head{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:nowrap;gap:8px;}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;}
  .kpi-label{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
  .kpi-value{font-size:18px;font-weight:600;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  thead th{text-align:left;font-size:9px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.6px;padding:7px 10px;border-bottom:0.5px solid var(--border);background:var(--surface-2);}
  tbody td{padding:7px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--cream);}
  .r{text-align:right;font-variant-numeric:tabular-nums;}
  .edit-btn,.del-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:0 2px;}
  .edit-btn{color:var(--blue);} .del-btn{color:var(--red);}
  .f-select{font-size:11px;padding:4px 8px;border-radius:var(--radius-sm);border:0.5px solid var(--border-mid);background:var(--surface);color:var(--text-2);font-family:'DM Sans',sans-serif;}
  .f-input{font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border-mid);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;}
  .modal-overlay{position:fixed;inset:0;background:rgba(61,43,31,0.35);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
  .modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-md);width:460px;max-width:95vw;}
  .modal-header{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-title{font-size:13px;font-weight:600;}
  .modal-close{background:none;border:none;font-size:18px;color:var(--text-3);cursor:pointer;}
  .modal-body{padding:18px;}
  .modal-footer{padding:12px 18px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
  .confirm-detail{margin-top:10px;padding:10px;background:var(--red-bg);border-radius:var(--radius-sm);font-size:12px;color:var(--red);}
  .success-toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:white;padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-md);animation:slideIn 0.25s ease;}
  .table-scroll-outer{position:relative;}
  .table-scroll-top{overflow-x:auto;overflow-y:hidden;height:10px;background:var(--surface-2);border-bottom:0.5px solid var(--border);}
  .table-scroll-top-inner{height:1px;}
  .table-scroll-body{overflow-x:auto;overflow-y:auto;max-height:520px;}
  table{table-layout:auto;min-width:100%;border-collapse:collapse;font-size:11px;}
  thead th{text-align:left;font-size:9px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;padding:6px 8px;border-bottom:0.5px solid var(--border);background:var(--surface-2)!important;white-space:nowrap;position:sticky;top:0;z-index:4;position:relative;}
  .col-resizer{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:3;}
  .col-resizer:hover,.col-resizer.resizing{background:var(--orange);opacity:0.4;}
  tbody tr.verified-row{background:rgba(59,109,17,0.04);}
  tbody tr.verified-row td{color:var(--text-3);}
  .lock-icon{font-size:12px;color:var(--green);opacity:0.8;}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .spinner{display:inline-block;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .info-encaiss{background:var(--blue-bg);border:0.5px solid rgba(24,95,165,0.15);border-radius:var(--radius-sm);padding:8px 12px;font-size:11px;color:var(--blue);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title"><i class="ti ti-writing" style="color:var(--orange)"></i> Chèques émis</div>
    <div class="topbar-right"><span style="font-size:11px;color:var(--text-3);" id="topbar-per"></span></div>
  </div>
  <div class="page-content">

    <div class="info-encaiss"><i class="ti ti-info-circle"></i> Les chèques émis n'apparaissent dans la banque qu'au moment où vous les encaissez via une opération bancaire.</div>

    <div class="kpi-row" id="kpi-cheques"></div>

    <div class="split-layout">
      <!-- LISTE -->
      <div>
        <div class="list-card">
          <div class="list-head">
            <div style="font-size:12px;font-weight:600;white-space:nowrap;">Chèques émis</div>
            <div style="display:flex;gap:6px;flex-wrap:nowrap;align-items:center;">
              <select class="f-select" id="fl-chq-per" onchange="updateDynamicFilters();renderKPIs();renderTable()"></select>
              <input class="f-input" type="text" id="fl-chq-search" placeholder="Rechercher…" oninput="renderTable()" style="width:130px;">
              <select class="f-select" id="fl-chq-type" onchange="renderTable()" style="width:120px;"><option value="">Tous types</option></select>
              <select class="f-select" id="fl-chq-statut" onchange="renderTable()">
                <option value="">Tous statuts</option>
                <option value="en_attente">En attente</option>
                <option value="encaisse">Encaissés</option>
                <option value="annule">Annulés</option>
              </select>
            </div>
          </div>
          <div id="cheques-table-outer" class="table-scroll-outer">
            <div class="table-scroll-top"><div class="table-scroll-top-inner"></div></div>
            <div class="table-scroll-body" id="cheques-table-wrap"><div style="padding:24px;text-align:center;color:var(--text-3);"><i class="ti ti-loader-2 spinner"></i></div></div>
          </div>
        </div>
      </div>

      <!-- FORMULAIRE -->
      <div>
        <div class="form-card">
          <div class="form-card-title"><i class="ti ti-plus"></i> <span id="chq-mode-lbl">Nouveau chèque</span></div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label req">N° de chèque</label>
              <input type="text" id="chq-num" placeholder="1234567">
            </div>
            <div class="form-group">
              <label class="form-label req">Date émission</label>
              <input type="date" id="chq-date">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label req">Bénéficiaire</label>
            <input type="text" id="chq-benef" placeholder="Nom du bénéficiaire">
          </div>
          <div class="form-group">
            <label class="form-label req">Montant (€)</label>
            <input type="number" id="chq-montant" step="0.01" min="0" placeholder="0,00">
          </div>
          <div class="form-group">
            <label class="form-label req">Type de mouvement</label>
            <select id="chq-type"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <select id="chq-desc"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Libellé complémentaire</label>
            <input type="text" id="chq-type-comp" placeholder="Précisions…">
          </div>
          <div class="form-group">
            <label class="form-label">Période</label>
            <select id="chq-per"></select>
          </div>
          <div id="chq-err" class="hidden" style="color:var(--red);font-size:11px;padding:6px 0;"></div>
          <div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);">
            <button class="btn btn-primary" style="flex:1" id="chq-submit" onclick="submitCheque()"><i class="ti ti-device-floppy"></i> Enregistrer</button>
            <button class="btn btn-secondary" onclick="resetCheque()"><i class="ti ti-refresh"></i> Vider</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL SUPPRIMER -->
<div class="modal-overlay hidden" id="modal-del">
  <div class="modal">
    <div class="modal-header"><span class="modal-title"><i class="ti ti-trash" style="color:var(--red)"></i> Supprimer le chèque</span><button class="modal-close" onclick="closeDel()">×</button></div>
    <div class="modal-body"><div style="font-size:12px;">Êtes-vous sûr de vouloir supprimer ce chèque ?</div><div class="confirm-detail" id="del-detail"></div></div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="closeDel()">Annuler</button><button class="btn btn-danger btn-sm" onclick="confirmDel()"><i class="ti ti-trash"></i> Supprimer</button></div>
  </div>
</div>

<script src="table-utils.js"></script>
<script src="auth.js"></script>
<script src="sheets.js"></script>
<script src="sidebar.js"></script>
<script>
let allCheques=[], delIdx=null, editChqIdx=null;

Auth.requireAuth(async()=>{
  await gapi.client.load('https://sheets.googleapis.com/$discovery/rest?version=v4');
    await Sheets.loadConfigFromSheet();
  Sidebar.build('cheques');
  const pers=Sheets.getPeriodes(), ap=Sidebar.getActivePeriode();
  document.getElementById('topbar-per').textContent=ap;

  ['chq-per','fl-chq-per'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    pers.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;if(p===ap)o.selected=true;s.appendChild(o);});
  });

  document.getElementById('chq-date').value=Sheets.todayISO();

  const types=Sheets.getTypesMouvement();
  const sc=document.getElementById('chq-type');
  sc.innerHTML='<option value="">— Choisir —</option>';
  types.forEach(t=>sc.innerHTML+=`<option>${t}</option>`);

  const descs=Sheets.getDescriptions();
  const sd=document.getElementById('chq-desc');
  sd.innerHTML='<option value="">—</option>';
  descs.forEach(d=>sd.innerHTML+=`<option>${d}</option>`);

  await loadData();
});

async function loadData(){
  allCheques=await Sheets.getCheques();
  Sidebar.setLastUpdate();
  updateDynamicFilters();
  renderKPIs();
  renderTable();
}

function updateDynamicFilters(){
  const cc=Sheets.cols.cheque;
  const per=document.getElementById('fl-chq-per')?.value||'';
  const rows=per?allCheques.filter(r=>r[cc.periode]===per):allCheques;
  // Types présents
  const types=[...new Set(rows.map(r=>r[cc.type_mvt]).filter(Boolean))].sort();
  const cur=document.getElementById('fl-chq-type')?.value||'';
  const flt=document.getElementById('fl-chq-type');
  if(flt){flt.innerHTML='<option value="">Tous types</option>';types.forEach(t=>flt.innerHTML+=`<option ${t===cur?'selected':''}>${escH(t)}</option>`);}
}

function onPeriodeChange(p){
  document.getElementById('topbar-per').textContent=p;
  renderKPIs();renderTable();
}

function renderKPIs(){
  const cc=Sheets.cols.cheque;
  const per=document.getElementById('fl-chq-per')?.value||'';
  const filtered=per?allCheques.filter(r=>r[cc.periode]===per):allCheques;
  const att=filtered.filter(r=>r[cc.statut]==='en_attente');
  const enc=filtered.filter(r=>r[cc.statut]==='encaisse');
  const totAtt=att.reduce((s,r)=>s+(parseFloat(r[cc.montant])||0),0);
  const totTotal=filtered.reduce((s,r)=>s+(parseFloat(r[cc.montant])||0),0);
  document.getElementById('kpi-cheques').innerHTML=`
    <div class="kpi"><div class="kpi-label">Chèques sur la période</div><div class="kpi-value">${filtered.length}</div><div style="font-size:10px;color:var(--text-3);margin-top:2px;">${enc.length} encaissé(s) — ${att.length} en attente</div></div>
    <div class="kpi"><div class="kpi-label">En attente encaissement</div><div class="kpi-value" style="color:var(--amber)">${fmt(totAtt)}</div><div style="font-size:10px;color:var(--text-3);">${att.length} chèque(s)</div></div>
    <div class="kpi"><div class="kpi-label">Total TTC période</div><div class="kpi-value">${fmt(totTotal)}</div><div style="font-size:10px;color:var(--text-3);">${enc.length} encaissé(s)</div></div>`;
}

function renderTable(){
  const cc=Sheets.cols.cheque;
  const sf=document.getElementById('fl-chq-statut')?.value||'';
  const sp=document.getElementById('fl-chq-per')?.value||'';
  const st=document.getElementById('fl-chq-type')?.value||'';
  const ss=document.getElementById('fl-chq-search')?.value.toLowerCase()||'';
  let rows=allCheques.filter(r=>(!sf||r[cc.statut]===sf)&&(!sp||r[cc.periode]===sp)&&(!st||r[cc.type_mvt]===st));
  if(ss) rows=rows.filter(r=>[r[cc.num_cheque],r[cc.beneficiaire],r[cc.description],r[cc.type_mvt]].join(' ').toLowerCase().includes(ss));
  rows=[...rows].reverse();
  if(!rows.length){document.getElementById('cheques-table-wrap').innerHTML='<div style="padding:24px;text-align:center;color:var(--text-3);font-size:12px;">Aucun chèque</div>';return;}
  const trs=rows.map(r=>{
    const ri=allCheques.indexOf(r);
    const s=r[cc.statut]||'';
    const isVerified=r[cc.verified]==='TRUE';
    const badge=s==='en_attente'
      ?'<span class="chip" style="background:var(--amber-bg);color:var(--amber);">En attente</span>'
      :s==='encaisse'
      ?'<span class="chip" style="background:var(--green-bg);color:var(--green);">Encaissé</span>'
      :'<span class="chip" style="background:var(--red-bg);color:var(--red);">Annulé</span>';
    return `<tr class="${isVerified?'verified-row':''}">
      <td style="text-align:center;padding:4px;">
        <input type="checkbox" ${isVerified?'checked':''} title="${isVerified?'Décocher pour modifier':'Cocher pour verrouiller'}"
          style="accent-color:var(--green);cursor:pointer;width:14px;height:14px;"
          onchange="toggleVerifiedChq(${ri},this.checked)">
      </td>
      <td style="color:var(--text-3);">${formatDate(r[cc.date_emission])}</td>
      <td style="font-weight:500;">${r[cc.num_cheque]||'—'}</td>
      <td>${r[cc.beneficiaire]||'—'}</td>
      <td><span class="chip chip-${chipType(r[cc.type_mvt])}">${r[cc.type_mvt]||'—'}</span></td>
      <td style="color:var(--text-3);font-size:10px;">${r[cc.description]||'—'}</td>
      <td style="color:var(--text-3);font-size:10px;">${r[cc.type_comp]||'—'}</td>
      <td class="r" style="font-weight:500;">${fmt(r[cc.montant])}</td>
      <td>${badge}</td>
      <td style="color:var(--text-3);font-size:10px;">${formatDate(r[cc.date_encaiss])}</td>
      <td class="r" style="white-space:nowrap;">
        ${isVerified
          ? `<span class="lock-icon" title="Chèque vérifié — décochez pour modifier"><i class="ti ti-lock"></i></span>`
          : s==='en_attente' ? `<button class="edit-btn" onclick="openEditChq(${ri})" title="Modifier"><i class="ti ti-pencil"></i></button>` : ''}
        <button class="del-btn" onclick="openDel(${ri},'${escH(r[cc.num_cheque]||'')} — ${escH(r[cc.beneficiaire]||'')}')"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('cheques-table-wrap').innerHTML=`<table id="cheques-table"><thead><tr>
    <th style="width:36px;"></th>
    <th>Date</th><th>N° chèque</th><th>Bénéficiaire</th><th>Type de mouvement</th>
    <th>Description</th><th>Libellé complémentaire</th><th class="r">Montant</th>
    <th>Statut</th><th>Encaissé le</th><th class="r">Actions</th>
  </tr></thead><tbody>${trs}</tbody></table>`;
  initColResize('cheques-table');
  syncScrollTop('cheques-table');
}

function resetCheque(){
  ['chq-num','chq-benef','chq-montant','chq-type-comp'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('chq-date').value=Sheets.todayISO();
  document.getElementById('chq-type').selectedIndex=0;
  document.getElementById('chq-desc').selectedIndex=0;
  document.getElementById('chq-err').classList.add('hidden');
  editChqIdx=null;
  document.getElementById('chq-mode-lbl').textContent='Nouveau chèque';
  document.getElementById('chq-submit').innerHTML='<i class="ti ti-device-floppy"></i> Enregistrer';
}

async function submitCheque(){
  const num=document.getElementById('chq-num').value.trim();
  const benef=document.getElementById('chq-benef').value.trim();
  const montant=parseFloat(document.getElementById('chq-montant').value);
  const type=document.getElementById('chq-type').value;
  if(!num){showErrChq('Le numéro de chèque est obligatoire.');return;}
  if(!benef){showErrChq('Le bénéficiaire est obligatoire.');return;}
  if(!montant||montant<=0){showErrChq('Le montant est obligatoire.');return;}
  if(!type){showErrChq('Le type de mouvement est obligatoire.');return;}
  const chq={
    num_cheque:num,
    date_emission:Sheets.normalizeDate(document.getElementById('chq-date').value),
    beneficiaire:benef,
    montant,
    type_mvt:type,
    description:document.getElementById('chq-desc').value,
    type_comp:document.getElementById('chq-type-comp').value,
    periode:document.getElementById('chq-per').value,
  };
  const btn=document.getElementById('chq-submit');btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spinner"></i>';
  try{
    await Sheets.saveCheque(chq);
    showToast('Chèque enregistré !');resetCheque();await loadData();
  }catch(e){showErrChq('Erreur : '+(e.message||'?'));}
  finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i> Enregistrer';}
}

function openEditChq(ri){
  const cc=Sheets.cols.cheque,r=allCheques[ri];
  if(r[cc.verified]==='TRUE'){showToast('⚠️ Chèque vérifié — décochez pour modifier');return;}
  editChqIdx=ri;
  document.getElementById('chq-num').value=r[cc.num_cheque]||'';
  document.getElementById('chq-date').value=r[cc.date_emission]||'';
  document.getElementById('chq-benef').value=r[cc.beneficiaire]||'';
  document.getElementById('chq-montant').value=r[cc.montant]||'';
  document.getElementById('chq-type').value=r[cc.type_mvt]||'';
  document.getElementById('chq-desc').value=r[cc.description]||'';
  document.getElementById('chq-type-comp').value=r[cc.type_comp]||'';
  document.getElementById('chq-mode-lbl').textContent='Modifier le chèque';
  document.getElementById('chq-submit').innerHTML='<i class="ti ti-device-floppy"></i> Enregistrer les modifications';
  document.querySelector('.form-card').scrollIntoView({behavior:'smooth'});
}

function openDel(ri,detail){delIdx=ri;document.getElementById('del-detail').textContent=detail;document.getElementById('modal-del').classList.remove('hidden');}
function closeDel(){document.getElementById('modal-del').classList.add('hidden');delIdx=null;}
async function confirmDel(){
  if(delIdx===null)return;
  try{await Sheets.deleteRow(Sheets.config.sheets.cheques,delIdx);closeDel();showToast('Chèque supprimé');await loadData();}
  catch(e){alert('Erreur : '+e.message);}
}

async function toggleVerifiedChq(ri,checked){
  try{
    await Sheets.updateCell(Sheets.config.sheets.cheques,ri+2,Sheets.cols.cheque.verified,checked?'TRUE':'FALSE');
    await loadData();
    showToast(checked?'Chèque verrouillé ✓':'Chèque déverrouillé');
  }catch(e){alert('Erreur : '+e.message);}
}
function initColResize(tableId){
  const table=document.getElementById(tableId);if(!table)return;
  table.querySelectorAll('thead th').forEach(th=>{
    if(th.querySelector('.col-resizer'))return;
    const r=document.createElement('div');r.className='col-resizer';th.appendChild(r);
    let startX,startW;
    r.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();startX=e.pageX;startW=th.offsetWidth;r.classList.add('resizing');
      const onMove=ev=>{th.style.width=(startW+ev.pageX-startX)+'px';};
      const onUp=()=>{r.classList.remove('resizing');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    });
  });
}
function chipType(t){if(!t)return'depense';const l=t.toLowerCase();if(l.includes('adopt'))return'adoption';if(l.includes('don'))return'don';if(l.includes('adh'))return'adhesion';return'depense';}
function formatDate(d){if(!d)return'—';const s=String(d).trim();if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const p=s.split('-');return`${p[2]}/${p[1]}/${p[0]}`;}return s;}
function fmt(v){if(!v&&v!==0)return'—';return parseFloat(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function showErrChq(m){const e=document.getElementById('chq-err');e.textContent=m;e.classList.remove('hidden');}
function showToast(m){const t=document.createElement('div');t.className='success-toast';t.innerHTML=`<i class="ti ti-check"></i> ${m}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,"&#39;").replace(/"/g,'&quot;');}
