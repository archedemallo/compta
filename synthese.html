<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthèse — Arche de Mallo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  .readonly-banner{background:var(--blue-bg);color:var(--blue);font-size:11px;padding:7px 16px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid rgba(24,95,165,0.15);}
  .period-picker{display:flex;gap:4px;flex-wrap:wrap;}
  .period-btn{font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border-mid);background:transparent;color:var(--text-2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
  .period-btn:hover{background:var(--warm);}
  .period-btn.active{background:var(--orange);color:white;border-color:var(--orange);}

  /* Navigation synthèse */
  .synth-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid var(--border);}
  .synth-btn{font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border-mid);background:transparent;color:var(--text-2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
  .synth-btn:hover{background:var(--warm);}
  .synth-btn.active{background:var(--brown-mid);color:white;border-color:var(--brown-mid);}

  /* Cards */
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .card-head{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .card-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .card-title i{color:var(--orange);}
  .card-body{padding:14px 16px;}

  /* KPI top */
  .kpi-top{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
  .kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .kpi-label{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .kpi-value{font-size:20px;font-weight:600;line-height:1.1;}
  .kpi-sub{font-size:10px;color:var(--text-3);margin-top:3px;}
  .v-green{color:var(--green);} .v-blue{color:var(--blue);} .v-orange{color:var(--orange);} .v-red{color:var(--red);}

  /* Grid 2 colonnes */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

  /* Flux mensuel */
  .flux-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .flux-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-2);margin-bottom:8px;}
  .flux-line{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
  .flux-line:not(:last-child){border-bottom:0.5px solid var(--border);padding-bottom:6px;margin-bottom:3px;}
  .fl-label{color:var(--text-3);}
  .fl-in{color:var(--green);font-weight:600;} .fl-out{color:var(--red);} .fl-net{font-weight:500;}

  /* Tableaux */
  table{width:100%;border-collapse:collapse;font-size:11px;}
  thead th{text-align:left;font-size:9px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.6px;padding:6px 10px;border-bottom:0.5px solid var(--border);background:var(--surface-2);}
  tbody td{padding:6px 10px;border-bottom:0.5px solid var(--border);}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--cream);}
  .r{text-align:right;font-variant-numeric:tabular-nums;}
  .amount-c{color:var(--green);font-weight:500;} .amount-d{color:var(--red);font-weight:500;}

  /* Barres CSS */
  .bar-row{display:grid;grid-template-columns:130px 1fr 80px;align-items:center;gap:10px;margin-bottom:8px;font-size:11px;}
  .bar-label{color:var(--text-2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{background:var(--surface-2);border-radius:3px;height:14px;overflow:hidden;}
  .bar-fill{height:14px;border-radius:3px;transition:width 0.6s ease;}
  .bar-value{font-variant-numeric:tabular-nums;text-align:right;font-size:10px;}
  .bar-green{background:var(--green);} .bar-red{background:var(--red);opacity:0.8;}
  .bar-orange{background:var(--orange);} .bar-blue{background:var(--blue);}

  /* Rapprochement */
  .rap-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:6px;font-size:12px;}
  .rap-ok{background:var(--green-bg);} .rap-warn{background:var(--amber-bg);} .rap-err{background:var(--red-bg);}
  .rap-label{font-weight:500;}
  .rap-val{font-variant-numeric:tabular-nums;font-weight:600;}

  /* Comparaison N vs N-1 */
  .comp-row{display:grid;grid-template-columns:1fr 1fr 1fr 80px;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:11px;}
  .comp-row:last-child{border-bottom:none;}
  .comp-evol{font-size:10px;font-weight:600;text-align:right;}
  .evol-pos{color:var(--green);} .evol-neg{color:var(--red);}

  /* Saisie rapide */
  .quick-entry{background:var(--surface);border:0.5px solid var(--orange);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
  .qe-title{font-size:11px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .qe-title i{color:var(--orange);}
  .qe-grid{display:grid;grid-template-columns:1fr 1fr 1fr 80px;gap:10px;align-items:end;}

  .spinner{display:inline-block;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .success-toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:white;padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-md);animation:slideIn 0.25s ease;}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  .loading-wrap{padding:48px;text-align:center;color:var(--text-3);}
  canvas{max-height:280px;}

  /* ---- FILTRES TOUJOURS VISIBLES ---- */
  .list-head{position:sticky;top:0;z-index:10;background:var(--surface);}
  .selection-bar{position:sticky;top:0;z-index:9;}

</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="readonly-banner" id="readonly-banner">
    <i class="ti ti-eye"></i>
    <span>Vue synthèse — <strong id="user-role-lbl">Lecture seule</strong></span>
    <span style="margin-left:auto;color:var(--text-3);font-size:10px;" id="last-update-banner">Chargement…</span>
  </div>
  <div class="topbar">
    <div class="topbar-title">Synthèse comptable</div>
    <div class="topbar-right">
      <div class="period-picker" id="period-picker"></div>
    </div>
  </div>
  <div class="page-content">

    <!-- NAVIGATION SYNTHÈSES -->
    <div class="synth-nav">
      <button class="synth-btn active" onclick="showSection('vue-generale')"><i class="ti ti-chart-bar"></i> Vue générale</button>
      <button class="synth-btn" onclick="showSection('flux-mensuels')"><i class="ti ti-calendar-stats"></i> Flux mensuels</button>
      <button class="synth-btn" onclick="showSection('evolution')"><i class="ti ti-trending-up"></i> Évolution 12 mois</button>
      <button class="synth-btn" onclick="showSection('repartition')"><i class="ti ti-chart-pie"></i> Répartition</button>
      <button class="synth-btn" onclick="showSection('top-fournisseurs')"><i class="ti ti-building-store"></i> Top fournisseurs</button>
      <button class="synth-btn" onclick="showSection('adoptions')"><i class="ti ti-home"></i> Adoptions</button>
      <button class="synth-btn" onclick="showSection('dons')"><i class="ti ti-coin"></i> Dons</button>
      <button class="synth-btn" onclick="showSection('subventions')"><i class="ti ti-award"></i> Subventions</button>
      <button class="synth-btn" onclick="showSection('cheques-att')"><i class="ti ti-writing"></i> Chèques en attente</button>
      <button class="synth-btn" onclick="showSection('remises-att')"><i class="ti ti-stack"></i> Remises en attente</button>
      <button class="synth-btn" onclick="showSection('rapprochement')"><i class="ti ti-scale"></i> Rapprochement caisse</button>
      <button class="synth-btn" onclick="showSection('depenses-cat')"><i class="ti ti-chart-bar-off"></i> Dépenses / catégorie</button>
      <button class="synth-btn" onclick="showSection('comparaison')"><i class="ti ti-arrows-exchange"></i> N vs N-1</button>
      <button class="synth-btn" onclick="showSection('tresorerie')"><i class="ti ti-cash"></i> Trésorerie prévisionnelle</button>
      <button class="synth-btn" onclick="showSection('evenements')"><i class="ti ti-confetti"></i> Événements</button>
      <button class="synth-btn" onclick="showSection('totaux-periode')"><i class="ti ti-sum"></i> Totaux période</button>
      <button class="synth-btn" onclick="showSection('rapport-annuel')"><i class="ti ti-file-analytics"></i> Rapport annuel</button>
    </div>

    <!-- LOADING -->
    <div id="global-loading" class="loading-wrap"><i class="ti ti-loader-2 spinner" style="font-size:28px;"></i><br><br>Chargement des données…</div>

    <!-- CONTENU DYNAMIQUE -->
    <div id="synth-content" style="display:none;"></div>

  </div>
</div>

<script src="auth.js"></script>
<script src="sheets.js"></script>
<script src="sidebar.js"></script>
<script>
// ============================================================
// ÉTAT GLOBAL
// ============================================================
let allCaisse=[],allBanque=[],allCheques=[],allRemises=[],allFactures=[];
let caisse1Ph=[],caisse2Ph=[];
let activePer='',activeSection='vue-generale';
let charts={};

// ============================================================
// INIT
// ============================================================
Auth.requireAuth(async(user)=>{
  await gapi.client.load('https://sheets.googleapis.com/$discovery/rest?version=v4');
  Sidebar.build('synthese');
  activePer=Sidebar.getActivePeriode();
  buildPeriodPicker();

  if(Auth.isAdmin()){
    document.getElementById('user-role-lbl').textContent='Administrateur';
    document.getElementById('readonly-banner').style.background='var(--green-bg)';
    document.getElementById('readonly-banner').style.color='var(--green)';
  }

  await loadData();
});

async function loadData(){
  document.getElementById('global-loading').style.display='block';
  document.getElementById('synth-content').style.display='none';
  try{
    [allCaisse,allBanque,allCheques,allRemises,allFactures,caisse1Ph,caisse2Ph]=await Promise.all([
      Sheets.getCaisseOperations(),Sheets.getBanqueOperations(),
      Sheets.getCheques(),Sheets.getRemises(),Sheets.getFactures(),
      Sheets.getCaissePhysique(1),Sheets.getCaissePhysique(2),
    ]);
    const now=new Date().toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-update-banner').textContent=`Mis à jour le ${now}`;
    Sidebar.setLastUpdate();
  }catch(e){console.error(e);}
  document.getElementById('global-loading').style.display='none';
  document.getElementById('synth-content').style.display='block';
  renderSection(activeSection);
}

function onPeriodeChange(p){activePer=p;buildPeriodPicker();destroyCharts();renderSection(activeSection);}

function buildPeriodPicker(){
  const picker=document.getElementById('period-picker');
  picker.innerHTML=Sheets.getPeriodes().map(p=>
    `<button class="period-btn ${p===activePer?'active':''}" onclick="selectPer('${p}')">${p}</button>`
  ).join('');
}
function selectPer(p){activePer=p;Sidebar.setPeriode(p);buildPeriodPicker();destroyCharts();renderSection(activeSection);}

function showSection(id){
  activeSection=id;
  document.querySelectorAll('.synth-btn').forEach((b,i)=>{
    const sections=['vue-generale','flux-mensuels','evolution','repartition','top-fournisseurs','adoptions','dons','subventions','cheques-att','remises-att','rapprochement','depenses-cat','comparaison','tresorerie','evenements','totaux-periode','rapport-annuel'];
    b.classList.toggle('active',sections[i]===id);
  });
  destroyCharts();
  renderSection(id);
}

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ============================================================
// DONNÉES FILTRÉES
// ============================================================
const cc=()=>Sheets.cols.caisse;
const cb=()=>Sheets.cols.banque;
const cp=()=>Sheets.cols.caissePhysique;

function caisseRows(){return allCaisse.filter(r=>r[cc().periode]===activePer);}
function banqueRows(){return allBanque.filter(r=>r[cb().periode]===activePer);}
function c1rows(){return caisseRows().filter(r=>r[cc().source]!=='C2');}
function c2rows(){return caisseRows().filter(r=>r[cc().source]==='C2');}

function sum(rows,col){return rows.reduce((s,r)=>s+(parseFloat(r[col])||0),0);}
function sumCredit(rows,col){return sum(rows,col);}

function calcFlux(rows,colD,colC,moisLabel){
  let inn=0,out=0;
  rows.forEach(r=>{
    if(moisLabel&&!rowInMonth(r[colD],moisLabel))return;
    inn+=(parseFloat(r[colC])||0);
    out+=(parseFloat(r[colD])||0);
  });
  return{in:inn,out};
}

function rowInMonth(dateStr,moisLabel){
  const d=parseDateFR(String(dateStr||''));
  if(!d)return false;
  return d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}).toLowerCase()===moisLabel.toLowerCase();
}

function parseDateFR(s){
  const p=s.split(/[\/\-]/);
  if(p.length!==3)return null;
  if(p[0].length===4)return new Date(p[0],p[1]-1,p[2]);
  return new Date(p[2],p[1]-1,p[0]);
}

function getMoisCourant(){return new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'});}

function get12MoisPeriode(per){
  // per = "2025 - 2026" → nov 2025 … oct 2026
  const parts=(per||'').split(' - ').map(Number);
  if(parts.length!==2||!parts[0])return get12Mois();
  const [y1,y2]=parts;
  const mois=[];
  for(let i=0;i<12;i++){
    const mMonth=(10+i)%12; // 10=nov, 11=déc, 0=jan … 9=oct
    const mYear=i<2?y1:y2;  // nov+déc = y1, jan…oct = y2
    const d=new Date(mYear,mMonth,1);
    mois.push({label:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}),full:d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}),date:d});
  }
  return mois;
}
function getPrevPeriode(per){
  const parts=(per||'').split(' - ').map(Number);
  if(parts.length!==2||!parts[0])return '';
  return `${parts[0]-1} - ${parts[1]-1}`;
}
function get12Mois(){
  const mois=[];
  const now=new Date();
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    mois.push({label:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}),full:d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}),date:d});
  }
  return mois;
}

// ============================================================
// RENDER SECTION
// ============================================================
function renderSection(id){
  const el=document.getElementById('synth-content');
  switch(id){
    case 'vue-generale':     el.innerHTML=renderVueGenerale();   break;
    case 'flux-mensuels':    el.innerHTML=renderFluxMensuels();  break;
    case 'evolution':        el.innerHTML=renderEvolution();     setTimeout(initEvolutionChart,50); break;
    case 'repartition':      el.innerHTML=renderRepartition();   setTimeout(initRepartitionCharts,50); break;
    case 'top-fournisseurs': el.innerHTML=renderTopFournisseurs(); break;
    case 'top-donateurs':    el.innerHTML=renderTopDonateurs();  break;
    case 'adoptions':        el.innerHTML=renderAdoptions();     setTimeout(initAdoptionsChart,50); break;
    case 'dons':             el.innerHTML=renderDons();          setTimeout(initDonsChart,50); break;
    case 'subventions':      el.innerHTML=renderSubventions();   setTimeout(initSubventionsChart,50); break;
    case 'cheques-att':      el.innerHTML=renderChequesAtt();    break;
    case 'remises-att':      el.innerHTML=renderRemisesAtt();    break;
    case 'rapprochement':    el.innerHTML=renderRapprochement(); break;
    case 'depenses-cat':     el.innerHTML=renderDepensesCat();   break;
    case 'comparaison':      el.innerHTML=renderComparaison();   break;
    case 'tresorerie':       el.innerHTML=renderTresorerie();    setTimeout(initTresoChart,50); break;
    case 'evenements':       el.innerHTML=renderEvenements();    break;
    case 'totaux-periode':   el.innerHTML=renderTotauxPeriode(); break;
    case 'rapport-annuel':   el.innerHTML=renderRapportAnnuel(); break;
    case 'saisie-rapide':    el.innerHTML=renderSaisieRapide();  break;
  }
}

// ============================================================
// 1. VUE GÉNÉRALE
// ============================================================
function renderVueGenerale(){
  const mois=getMoisCourant();
  const lastC1=caisse1Ph.length?caisse1Ph[caisse1Ph.length-1]:null;
  const lastC2=caisse2Ph.length?caisse2Ph[caisse2Ph.length-1]:null;
  const soldC1=lastC1?parseFloat(lastC1[cp().total])||0:0;
  const soldC2=lastC2?parseFloat(lastC2[cp().total])||0:0;
  const lastBq=banqueRows().length?banqueRows()[banqueRows().length-1]:null;
  const soldBq=lastBq?parseFloat(lastBq[cb().solde])||0:0;

  const bqF=calcFlux(banqueRows(),cb().debit,cb().credit,mois);
  const c1F=calcFlux(c1rows(),cc().debit,cc().credit,mois);
  const c2F=calcFlux(c2rows(),cc().debit,cc().credit,mois);

  const adoptsMois=caisseRows().filter(r=>(r[cc().type_mvt]||'').toLowerCase().includes('adopt')&&rowInMonth(r[cc().date],mois)).length;
  const donsMois=[...caisseRows(),...banqueRows()].filter(r=>{
    const t=(r[cc().type_mvt]||r[cb().type_mvt]||'').toLowerCase();
    const d=r[cc().date]||r[cb().date]||'';
    return t.includes('don')&&rowInMonth(d,mois);
  }).length;

  const recent=[...caisseRows(),...banqueRows()].filter(r=>r[cc().date]||r[cb().date]).map(r=>({
    date:r[cc().date]||r[cb().date]||'',libelle:r[cc().libelle]||r[cb().libelle]||'',
    type:r[cc().type_mvt]||r[cb().type_mvt]||'',
    credit:parseFloat(r[cc().credit]||r[cb().credit])||0,
    debit:parseFloat(r[cc().debit]||r[cb().debit])||0,
    src:r[cc().source]?'caisse':'banque',
    srcLabel:r[cc().source]?(r[cc().source]==='C2'?'Caisse 2':'Caisse 1'):'Banque',
    srcChip:r[cc().source]?(r[cc().source]==='C2'?'caisse2':'caisse1'):'banque',
    _date:parseDateFR(String(r[cc().date]||r[cb().date]||'')),
  })).filter(r=>r._date).sort((a,b)=>b._date-a._date).slice(0,15);

  return `
    <div class="kpi-top">
      <div class="kpi"><div class="kpi-label">Solde banque</div><div class="kpi-value v-blue">${fmt(soldBq)}</div><div class="kpi-sub">Période ${activePer}</div></div>
      <div class="kpi"><div class="kpi-label">Caisse 1</div><div class="kpi-value v-green">${fmt(soldC1)}</div><div class="kpi-sub">Dernier comptage</div></div>
      <div class="kpi"><div class="kpi-label">Caisse 2</div><div class="kpi-value v-green">${fmt(soldC2)}</div><div class="kpi-sub">Dernier comptage</div></div>
      <div class="kpi"><div class="kpi-label">Adoptions — ${mois.split(' ')[0]}</div><div class="kpi-value v-orange">${adoptsMois}</div><div class="kpi-sub">Ce mois</div></div>
      <div class="kpi"><div class="kpi-label">Dons — ${mois.split(' ')[0]}</div><div class="kpi-value v-orange">${donsMois}</div><div class="kpi-sub">Ce mois</div></div>
    </div>
    <div class="grid-3" style="margin-bottom:14px;">
      ${renderFluxCard('Banque',bqF)}
      ${renderFluxCard('Caisse 1',c1F)}
      ${renderFluxCard('Caisse 2',c2F)}
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title"><i class="ti ti-clock"></i> 15 dernières opérations</div></div>
      <table><thead><tr><th>Date</th><th>Source</th><th>Libellé</th><th>Type</th><th class="r">Débit</th><th class="r">Crédit</th></tr></thead>
      <tbody>${recent.map(r=>`<tr>
        <td style="color:var(--text-3);white-space:nowrap;">${r.date}</td>
        <td><span class="chip chip-${r.srcChip}">${r.srcLabel}</span></td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.libelle}</td>
        <td><span class="chip chip-${chipType(r.type)}">${r.type}</span></td>
        <td class="r amount-d">${r.debit?fmt(r.debit):''}</td>
        <td class="r amount-c">${r.credit?fmt(r.credit):''}</td>
      </tr>`).join('')}</tbody></table>
    </div>`;
}

function renderFluxCard(name,flux){
  const net=flux.in-flux.out;
  return `<div class="flux-card">
    <div class="flux-name">${name}</div>
    <div class="flux-line"><span class="fl-label">Entrées</span><span class="fl-in">${fmt(flux.in)}</span></div>
    <div class="flux-line"><span class="fl-label">Sorties</span><span class="fl-out">${flux.out>0?'−':''}${fmt(flux.out)}</span></div>
    <div class="flux-line" style="margin-top:4px;border-top:0.5px solid var(--border);padding-top:6px;">
      <span class="fl-label" style="font-weight:500;">Net</span>
      <span class="fl-net" style="color:${net>=0?'var(--green)':'var(--red)'}">${net>=0?'+':'−'}${fmt(Math.abs(net))}</span>
    </div>
  </div>`;
}

// ============================================================
// 2. FLUX MENSUELS
// ============================================================

// 8. DONS
// ============================================================

// Discriminateur : col 0 = 'C1'/'C2' → caisse, sinon → banque
function _isCaisse(r){const v=String(r[0]||'');return v==='C1'||v==='C2';}

// ── Extraction des entrées des Remises de chèques pour un keyword/periode ──
// Chaque chèque est un bloc de 8 colonnes à partir de detail_start (col 10)
// base+0=donateur, base+1=montant, base+2=num_cheque, base+3=type_mvt …
function _entreesRemises(keyword,per){
  const cr=Sheets.cols.remise;
  const DS=cr.detail_start; // 10
  const entries=[];
  allRemises.forEach(r=>{
    if((r[cr.periode]||'')!==per)return;
    const nb=parseInt(r[cr.nb_cheques])||0;
    for(let i=0;i<nb;i++){
      const base=DS+i*8;
      const t=(r[base+3]||'').toLowerCase();
      if(!t.includes(keyword))continue;
      const montant=parseFloat(r[base+1])||0;
      const donateur=String(r[base]||'Anonyme').trim()||'Anonyme';
      entries.push({nom:donateur,montant,date:r[cr.date_remise]||''});
    }
  });
  return entries;
}

// ── Lignes Caisse/Banque filtrées par keyword + periode ──
function _rowsTypePer(keyword,per){
  const fromCaisse=allCaisse.filter(r=>
    (r[cc().type_mvt]||'').toLowerCase().includes(keyword)&&(r[cc().periode]||'')===per);
  const fromBanque=allBanque.filter(r=>
    (r[cb().type_mvt]||'').toLowerCase().includes(keyword)&&(r[cb().periode]||'')===per);
  return[...fromCaisse,...fromBanque];
}

// ── Montants par mois pour le graphique (Caisse+Banque+Remises) ──
function _montantsParMois(keyword,mois12){
  const cr=Sheets.cols.remise;
  const DS=cr.detail_start;
  return mois12.map(m=>{
    let tot=0;
    allCaisse.forEach(r=>{if((r[cc().type_mvt]||'').toLowerCase().includes(keyword)&&rowInMonth(r[cc().date]||'',m.full))tot+=parseFloat(r[cc().credit])||0;});
    allBanque.forEach(r=>{if((r[cb().type_mvt]||'').toLowerCase().includes(keyword)&&rowInMonth(r[cb().date]||'',m.full))tot+=parseFloat(r[cb().credit])||0;});
    allRemises.forEach(r=>{
      if(!rowInMonth(r[cr.date_remise]||'',m.full))return;
      const nb=parseInt(r[cr.nb_cheques])||0;
      for(let i=0;i<nb;i++){const base=DS+i*8;if((r[base+3]||'').toLowerCase().includes(keyword))tot+=parseFloat(r[base+1])||0;}
    });
    return tot;
  });
}

// ── Somme totale (Caisse+Banque) ──
function _sumCredit(rows){
  return rows.reduce((s,r)=>s+(parseFloat(_isCaisse(r)?r[cc().credit]:r[cb().credit])||0),0);
}

// ── Construction du classement : {nom → {total, nb}} ──
// cfg.getNomCaisse(r), cfg.getNomBanque(r) : fonctions d'extraction du nom
function _listePersonnes(keyword,per,cfg){
  const map={};
  const add=(nom,v)=>{nom=nom||'Anonyme';if(!map[nom])map[nom]={total:0,nb:0};map[nom].total+=v;map[nom].nb++;};

  // Caisse
  allCaisse.filter(r=>(r[cc().type_mvt]||'').toLowerCase().includes(keyword)&&(r[cc().periode]||'')===per)
    .forEach(r=>add(cfg.getNomCaisse(r),parseFloat(r[cc().credit])||0));

  // Banque
  allBanque.filter(r=>(r[cb().type_mvt]||'').toLowerCase().includes(keyword)&&(r[cb().periode]||'')===per)
    .forEach(r=>add(cfg.getNomBanque(r),parseFloat(r[cb().credit])||0));

  // Remises de chèques
  _entreesRemises(keyword,per).forEach(e=>add(e.nom,e.montant));

  return Object.entries(map).sort((a,b)=>b[1].total-a[1].total);
}

// ── Rendu HTML d'un tableau de personnes ──
function _tablePersonnes(personnes,startIdx){
  return`<table><thead><tr><th>#</th><th>Nom / Libellé</th><th class="r">Nb</th><th class="r">Total</th></tr></thead><tbody>
  ${personnes.map(([nom,d],i)=>`<tr>
    <td style="color:var(--text-3);width:24px;">${startIdx+i}</td>
    <td style="font-size:11px;">${nom}</td>
    <td class="r" style="color:var(--text-3);width:30px;">${d.nb}</td>
    <td class="r amount-c" style="width:80px;white-space:nowrap;">${fmt(d.total)}</td>
  </tr>`).join('')}
  </tbody></table>`;
}

// ── Rendu générique dons/subventions ──
// cfg.getNomCaisse, cfg.getNomBanque, cfg.multiColonne (bool)
function _renderDonSection(keyword,icon,label,chartId,cfg){
  const prevPer=getPrevPeriode(activePer);
  const rows=_rowsTypePer(keyword,activePer);
  const totCaisseBanque=_sumCredit(rows);
  const totRemises=_entreesRemises(keyword,activePer).reduce((s,e)=>s+e.montant,0);
  const totCur=totCaisseBanque+totRemises;
  const totPrevCB=_sumCredit(_rowsTypePer(keyword,prevPer));
  const totPrevRem=_entreesRemises(keyword,prevPer).reduce((s,e)=>s+e.montant,0);
  const totPrev=totPrevCB+totPrevRem;
  const evol=totPrev>0?((totCur-totPrev)/totPrev*100):null;

  const personnes=_listePersonnes(keyword,activePer,cfg);

  let listeHtml='';
  if(personnes.length===0){
    listeHtml=`<div style="color:var(--text-3);font-size:12px;padding:8px 0;">Aucun enregistrement pour la période ${activePer}</div>`;
  } else if(cfg.multiColonne){
    // Blocs de 10 côte à côte (Dons)
    const BLOC=10;
    const nbBlocs=Math.ceil(personnes.length/BLOC)||1;
    const gridCols=Math.min(nbBlocs,4);
    const blocs=[];
    for(let b=0;b<nbBlocs;b++){
      blocs.push(`<div>${_tablePersonnes(personnes.slice(b*BLOC,(b+1)*BLOC),b*BLOC+1)}</div>`);
    }
    listeHtml=`<div style="display:grid;grid-template-columns:repeat(${gridCols},1fr);gap:16px;align-items:start;">${blocs.join('')}</div>`;
  } else {
    // Colonne unique taille du 1er bloc (Subventions)
    listeHtml=`<div style="max-width:480px;">${_tablePersonnes(personnes,1)}</div>`;
  }

  return `
  <div class="kpi-top" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px;">
    <div class="kpi"><div class="kpi-label">${label} — ${activePer}</div><div class="kpi-value v-green">${fmt(totCur)}</div><div class="kpi-sub">${cfg.kpiSub(personnes)}</div></div>
    <div class="kpi"><div class="kpi-label">Période précédente (${prevPer||'N/A'})</div><div class="kpi-value" style="color:var(--text-3);">${fmt(totPrev)}</div></div>
    <div class="kpi"><div class="kpi-label">Évolution</div><div class="kpi-value ${evol===null?'':evol>=0?'v-green':'v-red'}">${evol===null?'—':(evol>=0?'+':'')+evol.toFixed(1)+' %'}</div></div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title"><i class="${icon}"></i> Suivi mensuel — ${activePer} vs ${prevPer||'N-1'}</div></div>
    <div class="card-body"><canvas id="${chartId}" style="max-height:260px;"></canvas></div>
  </div>
  <div class="card" style="margin-top:14px;">
    <div class="card-head"><div class="card-title"><i class="ti ti-users"></i> Liste — ${activePer} <span style="font-weight:400;color:var(--text-3);margin-left:8px;">${cfg.listeLabel?cfg.listeLabel(personnes):personnes.length+' personne'+(personnes.length>1?'s':'')}</span></div></div>
    <div class="card-body">${listeHtml}</div>
  </div>`;
}

function _initGroupChart(keyword,chartId,colorCur,colorPrev){
  const mois12=get12MoisPeriode(activePer);
  const prevPer=getPrevPeriode(activePer);
  const prevMois12=get12MoisPeriode(prevPer);

  },options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v+'€'}},x:{stacked:false}}}});

    <td style="font-weight:500;">${r[cr.num_bordereau]||'—'}</td>

    <td class="r amount-c">${fmt(r[cr.montant_total])}</td>
  </tr>`).join(''):'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-3);">Aucune remise en attente</td></tr>'}</tbody></table></div>`;
}

// ============================================================
// 11. RAPPROCHEMENT CAISSE
// ============================================================
function renderRapprochement(){
  const lastC1=caisse1Ph.length?caisse1Ph[caisse1Ph.length-1]:null;
  const lastC2=caisse2Ph.length?caisse2Ph[caisse2Ph.length-1]:null;
  const physC1=lastC1?parseFloat(lastC1[cp().total])||0:null;
  const physC2=lastC2?parseFloat(lastC2[cp().total])||0:null;
  const comptC1=sum(c1rows(),cc().credit)-sum(c1rows(),cc().debit);
  const comptC2=sum(c2rows(),cc().credit)-sum(c2rows(),cc().debit);
  const ecartC1=physC1!==null?physC1-comptC1:null;
  const ecartC2=physC2!==null?physC2-comptC2:null;
  const cls=(e)=>e===null?'':Math.abs(e)<0.01?'rap-ok':Math.abs(e)<10?'rap-warn':'rap-err';
  return `<div class="card"><div class="card-head"><div class="card-title"><i class="ti ti-scale"></i> Rapprochement caisse physique vs comptable</div></div>
  <div class="card-body">
    <div class="rap-row ${cls(ecartC1)}">
      <div><div class="rap-label">Caisse 1</div><div style="font-size:10px;color:var(--text-3);">Comptable : ${fmt(comptC1)} — Physique : ${physC1!==null?fmt(physC1):'Non compté'} (${lastC1?lastC1[cp().mois]:'—'})</div></div>
      <div class="rap-val" style="color:${ecartC1===null?'var(--text-3)':Math.abs(ecartC1)<0.01?'var(--green)':Math.abs(ecartC1)<10?'var(--amber)':'var(--red)'}">
        ${ecartC1===null?'—':(ecartC1>=0?'+':'')+fmt(ecartC1)}
      </div>
    </div>
    <div class="rap-row ${cls(ecartC2)}">
      <div><div class="rap-label">Caisse 2</div><div style="font-size:10px;color:var(--text-3);">Comptable : ${fmt(comptC2)} — Physique : ${physC2!==null?fmt(physC2):'Non compté'} (${lastC2?lastC2[cp().mois]:'—'})</div></div>
      <div class="rap-val" style="color:${ecartC2===null?'var(--text-3)':Math.abs(ecartC2)<0.01?'var(--green)':Math.abs(ecartC2)<10?'var(--amber)':'var(--red)'}">
        ${ecartC2===null?'—':(ecartC2>=0?'+':'')+fmt(ecartC2)}
      </div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--text-3);display:flex;gap:16px;">
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--green-bg);border:0.5px solid var(--green);border-radius:2px;margin-right:4px;"></span>Équilibré</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:2px;margin-right:4px;"></span>Écart mineur (&lt;10€)</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:2px;margin-right:4px;"></span>Écart important</span>
    </div>
  </div></div>`;
}

// ============================================================
// 12. DÉPENSES PAR CATÉGORIE
// ============================================================
function renderDepensesCat(){
  const allOps=[...caisseRows(),...banqueRows()].filter(r=>parseFloat(r[cc().debit]||r[cb().debit])>0);
  const map={};
  allOps.forEach(r=>{const t=r[cc().type_mvt]||r[cb().type_mvt]||'Autre';const v=parseFloat(r[cc().debit]||r[cb().debit])||0;map[t]=(map[t]||0)+v;});
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,[,v])=>s+v,0);
  const max=sorted[0]?sorted[0][1]:1;
  return `<div class="card"><div class="card-head"><div class="card-title"><i class="ti ti-chart-bar-off"></i> Dépenses par catégorie — ${activePer}</div><span style="font-size:11px;color:var(--text-3);">Total : ${fmt(total)}</span></div>
  <div class="card-body">${sorted.map(([t,v])=>`
    <div class="bar-row">
      <div class="bar-label">${t}</div>
      <div class="bar-track"><div class="bar-fill bar-red" style="width:${Math.round(v/max*100)}%"></div></div>
      <div class="bar-value">${fmt(v)} <span style="color:var(--text-3);">(${Math.round(v/total*100)}%)</span></div>
    </div>`).join('')}</div></div>`;
}

// ============================================================
// 13. COMPARAISON N vs N-1
// ============================================================
function renderComparaison(){
  const periodes=Sheets.getPeriodes();
  const curIdx=periodes.indexOf(activePer);
  const prevPer=curIdx>0?periodes[curIdx-1]:null;
  const curC=caisseRows(),curB=banqueRows();
  const prevC=prevPer?allCaisse.filter(r=>r[cc().periode]===prevPer):[];
  const prevB=prevPer?allBanque.filter(r=>r[cb().periode]===prevPer):[];
  const metrics=[
    {label:'Entrées Banque',cur:sum(curB,cb().credit),prev:sum(prevB,cb().credit)},
    {label:'Sorties Banque',cur:sum(curB,cb().debit),prev:sum(prevB,cb().debit)},
    {label:'Entrées Caisse 1',cur:sum(curC.filter(r=>r[cc().source]!=='C2'),cc().credit),prev:sum(prevC.filter(r=>r[cc().source]!=='C2'),cc().credit)},
    {label:'Entrées Caisse 2',cur:sum(curC.filter(r=>r[cc().source]==='C2'),cc().credit),prev:sum(prevC.filter(r=>r[cc().source]==='C2'),cc().credit)},
    {label:'Dons',...calcDonsMetric(curC,curB,prevC,prevB)},
    {label:'Adoptions (nb)',cur:[...curC,...curB].filter(r=>(r[cc().type_mvt]||r[cb().type_mvt]||'').toLowerCase().includes('adopt')).length,prev:[...prevC,...prevB].filter(r=>(r[cc().type_mvt]||r[cb().type_mvt]||'').toLowerCase().includes('adopt')).length,isCount:true},
  ];
  return `<div class="card"><div class="card-head"><div class="card-title"><i class="ti ti-arrows-exchange"></i> Comparaison ${activePer} vs ${prevPer||'période précédente'}</div></div>
  <table><thead><tr><th>Indicateur</th><th class="r">${activePer}</th><th class="r">${prevPer||'N-1'}</th><th class="r">Évolution</th></tr></thead>
  <tbody>${metrics.map(m=>{
    const evol=m.prev>0?(m.cur-m.prev)/m.prev*100:m.cur>0?100:0;
    const sign=evol>=0?'+':'';
    const cls=evol>=0?'evol-pos':'evol-neg';
    return `<tr>
      <td style="font-weight:500;">${m.label}</td>
      <td class="r">${m.isCount?m.cur:fmt(m.cur)}</td>
      <td class="r" style="color:var(--text-3);">${m.isCount?m.prev:fmt(m.prev)}</td>
      <td class="r comp-evol"><span class="${cls}">${sign}${evol.toFixed(1)}%</span></td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}
function calcDonsMetric(cC,cB,pC,pB){
  const isDon=r=>(r[cc().type_mvt]||r[cb().type_mvt]||'').toLowerCase().includes('don');
  return{cur:sum(cC.filter(isDon),cc().credit)+sum(cB.filter(isDon),cb().credit),prev:sum(pC.filter(isDon),cc().credit)+sum(pB.filter(isDon),cb().credit)};
}

// 14. TRÉSORERIE PRÉVISIONNELLE
// ============================================================
function renderTresorerie(){
  return `<div class="card"><div class="card-head"><div class="card-title"><i class="ti ti-cash"></i> Trésorerie prévisionnelle — 3 prochains mois</div></div><div class="card-body"><canvas id="chart-treso"></canvas><div style="margin-top:12px;font-size:11px;color:var(--text-3);">Projection basée sur la moyenne des 3 derniers mois. Indicatif uniquement.</div></div></div>`;
}
function initTresoChart(){
  const mois3past=get12Mois().slice(-3);
  const avgIn=mois3past.reduce((s,m)=>s+calcFlux(allBanque,cb().debit,cb().credit,m.full).in,0)/3;
  const avgOut=mois3past.reduce((s,m)=>s+calcFlux(allBanque,cb().debit,cb().credit,m.full).out,0)/3;
  const now=new Date();
  const future=[];
  const lastBq=banqueRows().length?banqueRows()[banqueRows().length-1]:null;
  let soldeCur=lastBq?parseFloat(lastBq[cb().solde])||0:0;
  for(let i=1;i<=3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    soldeCur+=avgIn-avgOut;
    future.push({label:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}),solde:Math.max(0,soldeCur)});
  }
  const past3=mois3past.map(m=>{let s=0;allBanque.filter(r=>rowInMonth(r[cb().date],m.full)).forEach(r=>s+=parseFloat(r[cb().credit]||0)-parseFloat(r[cb().debit]||0));return{label:m.label};});
  const labels=[...mois3past.map(m=>m.label),...future.map(f=>f.label+' (prev.)')];
  const actuals=mois3past.map(m=>calcFlux(allBanque,cb().debit,cb().credit,m.full).in-calcFlux(allBanque,cb().debit,cb().credit,m.full).out);
  const projections=[...Array(3).fill(null),...future.map(f=>avgIn-avgOut)];
  const ctx=document.getElementById('chart-treso');if(!ctx)return;
  charts.treso=new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {label:'Réalisé (net)',data:[...actuals,...Array(3).fill(null)],backgroundColor:'rgba(59,109,17,0.7)'},
    {label:'Prévision (net)',data:projections,backgroundColor:'rgba(201,107,42,0.5)',borderDash:[5,5]},
  ]},options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{ticks:{callback:v=>v+'€'}}}}});
}

function renderSaisieRapide(){

  return `<div class="quick-entry">
    <div class="qe-title"><i class="ti ti-pencil"></i> Saisie rapide — Caisse 1</div>

      <div style="display:flex;flex-direction:column;gap:4px;"><label style="font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;">Type</label><select id="qe-type" style="padding:6px 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-sm);font-size:12px;font-family:'DM Sans',sans-serif;">${topts}</select></div>

      <div style="display:flex;flex-direction:column;gap:4px;"><label style="font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;">&nbsp;</label><button class="btn btn-primary btn-sm" onclick="submitQuick()"><i class="ti ti-send"></i> Envoyer</button></div>
    </div>
    ${msg}
  </div>`;
}

async function submitQuick(){
  const lib=document.getElementById('qe-lib')?.value.trim();
  const type=document.getElementById('qe-type')?.value;
  const mont=parseFloat(document.getElementById('qe-mont')?.value);
  if(!lib||!mont||mont<=0){alert('Libellé et montant obligatoires.');return;}
  try{
    await Sheets.saveCaisseOperation({source:'C1',date:Sheets.todayISO(),libelle:lib,credit:mont,debit:'',periode:activePer,type_mvt:type,description:'Saisie synthèse'});
    document.getElementById('qe-lib').value='';document.getElementById('qe-mont').value='';
    showToast('Opération envoyée !');
    await loadData();
  }catch(e){alert('Erreur : '+e.message);}
}

// ============================================================
// HELPERS
// ============================================================
function chipType(t){if(!t)return'depense';const l=t.toLowerCase();if(l.includes('adopt'))return'adoption';if(l.includes('don'))return'don';if(l.includes('adh'))return'adhesion';if(l.includes('vén')||l.includes('ment'))return'evenement';return'depense';}
function fmt(v){if(!v&&v!==0)return'—';const n=parseFloat(v);if(isNaN(n))return'—';return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function showToast(m){const t=document.createElement('div');t.className='success-toast';t.innerHTML=`<i class="ti ti-check"></i> ${m}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}
</script>
