<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Arche de Mallo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--cream); }
  .login-wrap { width: 360px; }
  .login-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 40px 36px; text-align: center; }
  .login-paw { font-size: 48px; margin-bottom: 12px; display: block; }
  .login-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); margin-bottom: 4px; }
  .login-sub { font-size: 12px; color: var(--text-3); margin-bottom: 32px; line-height: 1.5; }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 11px 16px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-mid); background: var(--surface);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; color: var(--text); transition: all 0.15s;
  }
  .btn-google:hover { background: var(--cream); border-color: var(--orange); box-shadow: 0 2px 8px rgba(201,107,42,0.12); }
  .login-footer { margin-top: 24px; font-size: 10px; color: var(--text-3); line-height: 1.6; }
  .auth-error { margin-top: 14px; padding: 10px 14px; background: var(--red-bg); color: var(--red); border-radius: var(--radius-sm); font-size: 12px; }
  .loading { margin-top: 16px; font-size: 12px; color: var(--text-3); }
  .loading i { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <span class="login-paw">🐾</span>
    <div class="login-title">L'Arche de Mallo</div>
    <div class="login-sub">Gestion comptable de l'association<br>Autrechêne — 90140</div>

    <button class="btn-google" onclick="Auth.signIn()">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Se connecter avec Google
    </button>

    <div id="auth-error" class="auth-error hidden"></div>
    <div id="loading" class="loading hidden"><i class="ti ti-loader-2"></i> Connexion en cours…</div>

    <div class="login-footer">
      Accès réservé aux membres autorisés<br>de l'association L'Arche de Mallo
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // Si déjà connecté, rediriger
  Auth.init((isLoggedIn) => {
    if (isLoggedIn) window.location.href = 'index.html';
  });

  // Afficher loading pendant la connexion
  const origSignIn = Auth.signIn;
  document.querySelector('.btn-google').addEventListener('click', () => {
    document.getElementById('loading').classList.remove('hidden');
  });
</script>
</body>
</html>
